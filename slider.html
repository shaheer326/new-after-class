<head>

<title>Bootstrap Example</title>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</head>

<body>
    <div class="container">
        <h2>carousel homework</h2>
        <div id="mycarousel" class="carousel slide" data-ride="carousel">

            <ol class="carousel-indicators">
                <li data-target="#mycarousel" data-slide-to="0" class="active"></li>
                <li data-target="#mycarousel" data-slide-to="1" ></li>
                <li data-target="#mycarousel" data-slide-to="2" ></li>
                <li data-target="#mycarousel" data-slide-to="3" ></li>
            </ol>

            <div class="carousel-inner">
                <div class="item active">
                    <img src="https://images.unsplash.com/photo-1598623549917-a38dc6cd19b5?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTZ8fG1lbW9yaWVzfGVufDB8fDB8fHww" alt="img1">
                </div>
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1531845116688-48819b3b68d9?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8bWVtb3JpZXN8ZW58MHx8MHx8fDA%3D" alt="img2">
                </div>
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1528569937393-ee892b976859?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8bWVtb3JpZXN8ZW58MHx8MHx8fDA%3D" alt="penguin">
                </div>
                <div class="item">
                    <img src="https://images.unsplash.com/photo-1453828423292-392a660a502f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8bWVtb3JpZXN8ZW58MHx8MHx8fDA%3D" alt="penguin">
                </div>
            </div>

            <a class="left carousel-control" href="" data-slide="perv">
                <span class="glyphicon glyphicon-chevron-left"></span>
            </a>
            <a class="right carousel-control" href="#mycarousel" data-slide="next">
                <span class="glyphicon glyphicon-chevron-right"></span>
            </a>
        </div>
    </div>
  

</body>

</html>
